name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Rebuild & restart tasks-service
    runs-on: self-hosted
    environment: production   # <-- здесь GitHub будет ждать апрув
    needs: []

    steps:
      - name: Rebuild and restart
        env:
          INFRA_DIR: ${{ secrets.INFRA_DIR }}
        run: |
          docker compose -f "$INFRA_DIR/docker-compose.yml" --project-directory "$INFRA_DIR" build --no-cache tasks-service
          docker compose -f "$INFRA_DIR/docker-compose.yml" --project-directory "$INFRA_DIR" up -d tasks-service
