name: CI tasks-service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Unit tests
        run: |
          go test \
            ./app/internal/tasks/domain/... \
            ./app/internal/tasks/service/... \
            ./app/internal/tasks/dto/... \
            ./app/internal/tasks/repository/postgres/... \
            ./app/internal/shared_tasks/domain/... \
            ./app/internal/shared_tasks/service/... \
            ./app/pkg/api/signature/... \
            -v -race -coverprofile=coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: E2E tests
        env:
          # Отключаем Ryuk (cleanup-контейнер) — не всегда доступен в CI
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -tags e2e ./app/tests/e2e/... -v -timeout 180s

  # Пересборка контейнера запускается ТОЛЬКО если все тесты прошли
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -o tasks-service ./app/cmd

      - name: Docker build
        run: docker build -t tasks-service:${{ github.sha }} .
