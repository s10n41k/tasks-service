name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: |
          go test \
            ./app/internal/tasks/domain/... \
            ./app/internal/tasks/dto/... \
            ./app/internal/tasks/service/... \
            ./app/internal/tasks/repository/... \
            ./app/internal/shared_tasks/domain/... \
            ./app/internal/shared_tasks/service/... \
            ./app/pkg/... \
            -v -count=1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go test -tags=e2e ./app/tests/e2e/... -v -count=1 -timeout 120s
